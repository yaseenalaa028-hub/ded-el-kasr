<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DED EL KASR | ضد الكسر للمطابخ والرخام</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --gray: #151515;
            --border: rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--dark); color: white; overflow-x: hidden; }

        /* --- الهيدر الاحترافي --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            z-index: 2000; border-bottom: 1px solid var(--border);
        }
        .logo-box { display: flex; align-items: center; gap: 20px; }
        .logo-name { font-size: 1.5rem; font-weight: 900; color: var(--gold); text-decoration: none; }
        
        .social-nav a { color: white; margin-right: 15px; font-size: 1.3rem; transition: 0.3s; }
        .social-nav a:hover { color: var(--gold); }

        .btn-order-main { 
            background: var(--gold); color: black; padding: 10px 25px; 
            border-radius: 10px; font-weight: 900; text-decoration: none; 
            font-size: 0.9rem; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- قسم واجهة الموقع --- */
        .hero {
            height: 70vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1556912172-45b7abe8b7e1?q=80&w=2070') center/cover;
            text-align: center; border-bottom: 2px solid var(--border);
        }
        .hero h1 { font-size: 3.5rem; font-weight: 900; color: var(--gold); }

        /* --- معرض الأعمال --- */
        .gallery-section { padding: 80px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { position: relative; border-radius: 20px; overflow: hidden; height: 400px; border: 1px solid var(--border); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); filter: brightness(0.5); }
        .card-info { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: 0.4s; background: rgba(0,0,0,0.4); }
        .card:hover .card-info { opacity: 1; }
        .card-info h3 { color: var(--gold); font-size: 1.8rem; }

        /* --- لوحة تحكم المهندس ياسين --- */
        #adminPanel { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 9999; align-items: center; justify-content: center; padding: 20px;
        }
        .dashboard { 
            background: white; color: #333; padding: 40px; border-radius: 30px; 
            width: 100%; max-width: 600px; height: 85vh; overflow-y: auto;
        }
        .tabs-header { display: flex; border-bottom: 2px solid #eee; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: 900; cursor: pointer; color: #888; }
        .tab-btn.active { border-bottom: 4px solid var(--gold); color: var(--gold); }

        .form-group { margin-bottom: 20px; }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-top: 5px; font-weight: 600; }
        .btn-submit { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; }

        /* --- إدارة الحذف --- */
        .delete-manager { margin-top: 20px; }
        .switch-container { display: flex; align-items: center; justify-content: space-between; background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .delete-list { border: 1px solid #eee; border-radius: 12px; max-height: 300px; overflow-y: auto; }
        .delete-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .btn-trash { color: #ff4444; cursor: pointer; background: none; border: none; font-size: 1.1rem; }

        /* --- الأزرار العائمة --- */
        .wa-float { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        footer { padding: 40px; text-align: center; border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
</head>
<body ondblclick="unlockAdmin()">

    <header>
        <div class="logo-box">
            <a href="#" class="logo-name">DED EL KASR</a>
            <div class="social-nav">
                <a href="https://facebook.com/YOUR_PAGE"><i class="fab fa-facebook"></i></a>
                <a href="https://wa.me/201144265938"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
        <a href="https://wa.me/201144265938?text=أريد طلب معاينة لمطبخ" class="btn-order-main">اطلب المعاينة الآن</a>
    </header>

    <section class="hero">
        <div>
            <h1>ضد الكسر للمطابخ</h1>
            <p>إبداع في التصميم.. دقة في التنفيذ</p>
        </div>
    </section>

    <section class="gallery-section">
        <h2 style="text-align:center; color:var(--gold); margin-bottom:50px; font-size:2.5rem;">معرض الأعمال الحديثة</h2>
        <div class="grid" id="mainGallery"></div>
    </section>

    <div id="adminPanel">
        <div class="dashboard">
            <h2 style="text-align:center; margin-bottom:20px;">إعدادات الموقع (خاص)</h2>
            
            <div class="tabs-header">
                <button class="tab-btn active" id="tabAdd" onclick="toggleTab('add')">إضافة أعمال</button>
                <button class="tab-btn" id="tabDel" onclick="toggleTab('del')">إدارة الحذف</button>
            </div>

            <div id="addSection">
                <div class="form-group">
                    <label>رابط الصورة المباشر</label>
                    <input type="text" id="inpUrl" placeholder="https://i.ibb.co/..../image.jpg">
                </div>
                <div class="form-group">
                    <label>اسم العمل</label>
                    <input type="text" id="inpName" placeholder="مثال: مطبخ ألمنيوم دبل">
                </div>
                <button class="btn-submit" onclick="publishWork()">نشر العمل الآن</button>
            </div>

            <div id="delSection" style="display:none;">
                <div class="switch-container">
                    <span><b>تفعيل خاصية الحذف:</b></span>
                    <input type="checkbox" id="delToggle" style="width:30px; height:30px; cursor:pointer;">
                </div>
                <div class="delete-list" id="delListItems">
                    </div>
            </div>

            <button onclick="closeAdmin()" style="width:100%; margin-top:20px; background:none; border:none; color:#999; cursor:pointer; font-weight:bold;">إغلاق الإعدادات</button>
        </div>
    </div>

    <a href="https://wa.me/201144265938" class="wa-float"><i class="fab fa-whatsapp"></i></a>

    <footer>
        <p>جميع الحقوق محفوظة © 2026 | ضد الكسر - م/ ياسين علاء</p>
    </footer>

    <script>
        // إعدادات السيرفر الخاص بك
        const fbConfig = { databaseURL: "https://ded-el-kasr-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        // فك قفل الإدارة
        function unlockAdmin() {
            let pass = prompt("من فضلك أدخل كلمة السر الخاصة بك:");
            if(pass === "123") {
                document.getElementById('adminPanel').style.display = 'flex';
                fetchDeleteList();
            }
        }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        // التبديل بين التبويبات
        function toggleTab(mode) {
            document.getElementById('addSection').style.display = mode === 'add' ? 'block' : 'none';
            document.getElementById('delSection').style.display = mode === 'del' ? 'block' : 'none';
            document.getElementById('tabAdd').classList.toggle('active', mode === 'add');
            document.getElementById('tabDel').classList.toggle('active', mode === 'del');
        }

        // رفع عمل جديد
        function publishWork() {
            const url = document.getElementById('inpUrl').value;
            const name = document.getElementById('inpName').value || "تصميم جديد";
            if(!url.includes('http')) return alert("يرجى إدخال رابط صورة صحيح!");
            
            db.ref('works').push({ url, name }).then(() => {
                alert("تم رفع العمل بنجاح!");
                location.reload();
            });
        }

        // عرض الصور للزوار (بدون أي أزرار حذف)
        db.ref('works').on('value', (s) => {
            const gallery = document.getElementById('mainGallery');
            gallery.innerHTML = '';
            s.forEach((child) => {
                const data = child.val();
                gallery.innerHTML += `
                    <div class="card">
                        <img src="${data.url}">
                        <div class="card-info"><h3>${data.name}</h3></div>
                    </div>`;
            });
        });

        // قايمة الحذف جوه لوحة التحكم فقط
        function fetchDeleteList() {
            const listDiv = document.getElementById('delListItems');
            listDiv.innerHTML = '<p style="padding:15px;">جاري التحميل...</p>';
            db.ref('works').once('value', (s) => {
                listDiv.innerHTML = '';
                s.forEach((child) => {
                    const data = child.val();
                    listDiv.innerHTML += `
                        <div class="delete-row">
                            <span>${data.name}</span>
                            <button onclick="confirmDel('${child.key}')" class="btn-trash"><i class="fas fa-trash-alt"></i></button>
                        </div>`;
                });
            });
        }

        function confirmDel(id) {
            const isEnabled = document.getElementById('delToggle').checked;
            if(!isEnabled) return alert("من فضلك قم بتفعيل مفتاح الحذف أولاً!");
            
            if(confirm("هل تريد حذف هذا العمل نهائياً؟")) {
                db.ref('works').child(id).remove().then(() => fetchDeleteList());
            }
        }
    </script>
</body>
</html>
